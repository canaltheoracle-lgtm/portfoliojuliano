<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Curso de Trading</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#000;color:#fff;overflow-x:hidden}
  .hero{min-height:100vh;background:radial-gradient(ellipse at top,#1a1a1a 0%,#000 60%);padding:40px 24px;display:flex;align-items:center;justify-content:center;position:relative}
  .hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,193,7,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,193,7,.04) 1px,transparent 1px);background-size:40px 40px}
  .container{max-width:540px;text-align:center;position:relative;z-index:1}
  .pill{display:inline-block;padding:6px 14px;background:rgba(255,193,7,.1);border:1px solid #ffc107;border-radius:99px;font-size:11px;font-weight:700;color:#ffc107;margin-bottom:20px;letter-spacing:1px}
  h1{font-size:54px;font-weight:900;line-height:.95;margin-bottom:18px;letter-spacing:-2px}
  h1 .y{color:#ffc107;display:block}
  .sub{font-size:16px;color:#a3a3a3;margin-bottom:30px;line-height:1.5;max-width:440px;margin-left:auto;margin-right:auto}
  .price-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #262626;padding:24px;border-radius:16px;margin-bottom:20px}
  .old{color:#525252;text-decoration:line-through;font-size:14px}
  .new{font-size:38px;font-weight:900;color:#ffc107;letter-spacing:-1px}
  .new small{color:#fff;font-size:14px;font-weight:400}
  .install{font-size:13px;color:#a3a3a3;margin-top:4px}
  .btn{display:block;width:100%;padding:18px;background:#ffc107;color:#000;text-decoration:none;border-radius:10px;font-weight:900;font-size:15px;letter-spacing:.5px;margin-top:20px;text-transform:uppercase;box-shadow:0 0 40px rgba(255,193,7,.3)}
  .guarantees{display:flex;justify-content:center;gap:24px;margin-top:24px;font-size:11px;color:#737373;flex-wrap:wrap}
  .guarantees span::before{content:"🔒 ";margin-right:4px}
</style>
</head>
<body>
<section class="hero">
  <div class="container">
    <div class="pill">📈 NOVO LANÇAMENTO</div>
    <h1>Do zero ao primeiro lucro<span class="y">em 30 dias.</span></h1>
    <p class="sub">Aprenda a operar day trade com método validado em mais de 8.000 alunos.</p>
    <div class="price-card">
      <div class="old">De R$ 1.997,00 por</div>
      <div class="new">R$ 297<small>,00</small></div>
      <div class="install">ou 12x de R$ 29,70</div>
      <a href="#" class="btn">QUERO ENTRAR AGORA →</a>
    </div>
    <div class="guarantees">
      <span>Pagamento seguro</span>
      <span>7 dias garantia</span>
      <span>Acesso vitalício</span>
    </div>
  </div>
</section>
</body>
</html>
