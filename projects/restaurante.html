<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Trattoria Bella</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Georgia,serif;background:#1a0f0a;color:#fff7ed;overflow-x:hidden}
  .hero{min-height:100vh;background:radial-gradient(ellipse at center,#3c1f12 0%,#1a0f0a 70%);position:relative;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .hero::before{content:"";position:absolute;inset:0;background:repeating-radial-gradient(circle at 20% 30%,rgba(217,119,6,.05) 0px,transparent 60px),repeating-radial-gradient(circle at 80% 70%,rgba(217,119,6,.04) 0px,transparent 80px)}
  .container{position:relative;z-index:1;max-width:540px}
  .frame{border:1px solid rgba(217,119,6,.4);padding:50px 36px;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);border-radius:2px;position:relative}
  .frame::before,.frame::after{content:"";position:absolute;width:30px;height:30px;border:1px solid #d97706}
  .frame::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .frame::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
  .est{font-size:10px;letter-spacing:6px;color:#d97706;margin-bottom:8px;font-family:system-ui,sans-serif;font-weight:600}
  .logo{font-family:Georgia,serif;font-style:italic;font-size:46px;font-weight:400;color:#fbbf24;margin-bottom:8px;letter-spacing:-.5px}
  .tag{font-size:11px;letter-spacing:4px;color:#fed7aa;margin-bottom:30px;font-family:system-ui,sans-serif}
  h1{font-size:30px;font-weight:300;line-height:1.3;margin-bottom:14px;font-style:italic}
  .sub{font-size:14px;color:#fed7aa;line-height:1.7;margin-bottom:28px;font-family:system-ui,sans-serif}
  .ornament{color:#d97706;font-size:18px;margin:20px 0;letter-spacing:6px}
  .cta{display:inline-block;padding:14px 32px;background:#d97706;color:#1a0f0a;text-decoration:none;font-weight:700;font-family:system-ui,sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;border-radius:2px}
  .cta:hover{background:#fbbf24}
  .info{display:flex;justify-content:center;gap:30px;margin-top:30px;font-size:11px;color:#fed7aa;font-family:system-ui,sans-serif;letter-spacing:1px}
</style>
</head>
<body>
<section class="hero">
  <div class="container">
    <div class="frame">
      <div class="est">EST. 1987</div>
      <div class="logo">Trattoria Bella</div>
      <div class="tag">CUCINA ITALIANA</div>
      <div class="ornament">✦ ✦ ✦</div>
      <h1>Uma noite memorável<br>te aguarda.</h1>
      <p class="sub">Massas frescas, vinhos selecionados e o autêntico sabor da Toscana no coração da cidade.</p>
      <a href="#" class="cta">Reservar mesa</a>
      <div class="info">
        <span>QUI–DOM</span>
        <span>19H – 00H</span>
      </div>
    </div>
  </div>
</section>
</body>
</html>
